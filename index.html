<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tavus Sitemap</title>
    <style>
      :root {
        --blue: #2f7df2;
        --ink: #172033;
        --muted: #62708a;
        --paper: #f7f9fd;
        --line: #74a8ff;
        --new: #f4b63f;
        --existing: #1fbd7a;
        --restructure: #6d73ff;
        --external: #ef6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--paper);
      }
      .viewer {
        width: 100vw;
        height: 100vh;
        overflow: auto;
        background:
          linear-gradient(#eef4ff 1px, transparent 1px),
          linear-gradient(90deg, #eef4ff 1px, transparent 1px),
          var(--paper);
        background-size: 40px 40px;
      }
      .controls {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border: 1px solid #c7d7f6;
        border-radius: 8px;
        background: rgba(255,255,255,.95);
        box-shadow: 0 12px 32px rgba(23,32,51,.16);
      }
      button, input {
        min-height: 36px;
        border: 1px solid #c7d7f6;
        border-radius: 8px;
        background: white;
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        padding: 0 12px;
      }
      button { cursor: pointer; }
      button:hover { border-color: var(--blue); }
      input { width: 74px; text-align: center; }
      .canvas { position: relative; width: 4200px; height: 2400px; }
      .canvas-stage {
        position: absolute;
        inset: 0 auto auto 0;
        width: 4200px;
        min-height: 2400px;
        padding: 120px 900px 220px;
        transform-origin: top left;
      }
      .page-card {
        position: absolute;
        z-index: 3;
        width: 286px;
        min-height: 124px;
        border: 3px solid var(--blue);
        border-radius: 18px;
        background: white;
        box-shadow: 0 10px 24px rgba(31,94,194,.09);
      }
      .graph-lines {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
      }
      .graph-line {
        stroke: var(--line);
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow);
      }
      .chrome {
        height: 26px;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 0 12px;
      }
      .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--blue); }
      .menu-dot {
        position: absolute;
        top: -13px;
        right: -16px;
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: var(--blue);
        color: white;
        font-weight: 800;
      }
      .page-title {
        margin: 0 14px 12px;
        color: var(--blue);
        font-size: 21px;
        line-height: 1.08;
        text-align: center;
        letter-spacing: 0;
      }
      .path {
        margin: -5px 14px 12px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.25;
        text-align: center;
        word-break: break-word;
      }
      .badges { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: -3px 10px 10px; }
      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 20px;
        padding: 0 7px;
        border-radius: 999px;
        color: white;
        font-size: 10px;
        font-weight: 750;
        text-transform: uppercase;
      }
      .badge.exists { background: var(--existing); }
      .badge.restructure { background: var(--restructure); }
      .badge.net-new { background: var(--new); color: #332300; }
      .badge.external { background: var(--external); }
      .badge.footer-only { background: #59657c; }
      .sections { display: flex; flex-direction: column; gap: 4px; padding: 0 12px 12px; }
      .section {
        display: grid;
        gap: 5px;
        min-height: 44px;
        padding: 9px 11px;
        border-radius: 4px;
        color: white;
        background: var(--blue);
      }
      .section-title { font-size: 15px; line-height: 1.2; overflow-wrap: anywhere; }
      .section-note { font-size: 10px; line-height: 1.25; opacity: .82; }
    </style>
  </head>
  <body>
    <main class="viewer" id="viewer">
      <div class="canvas" id="canvas"></div>
    </main>
    <div class="controls">
      <button id="zoomOut" title="Zoom out">-</button>
      <input id="zoom" type="number" min="10" max="200" step="1" value="100" aria-label="Zoom percent" />
      <button id="zoomIn" title="Zoom in">+</button>
    </div>

      function escapeHtml(str) { return String(str).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

      function sectionColor(type = "") { const value = String(type || "").trim(); return isHexColor(value) ? value : (LEGACY_SECTION_COLORS[value] || "#2f7df2"); }

        const hex = sectionColor(background).replace("#", "");
        const r = parseInt(hex.slice(0, 2), 16);
        const g = parseInt(hex.slice(2, 4), 16);
        const b = parseInt(hex.slice(4, 6), 16);
        return (r * 299 + g * 587 + b * 114) / 1000 > 150 ? "#172033" : "#fff";
      }
      function allNodes(node = map.root) { return [node, ...(node.children || []).flatMap(allNodes)]; }
      function findNode(id, node = map.root) {
        if (node.id === id) return node;
        for (const child of node.children || []) { const found = findNode(id, child); if (found) return found; }
        return null;
      }
      function estimatedCardHeight(node) {
        const sections = node.sections || [];
        return 122 + sections.reduce((sum, section) => {
          const title = String(section[0] || "");
          const note = String(section[1] || "");
          return sum + 60 + Math.ceil(title.length / 26) * 14 + Math.ceil(note.length / 42) * 12;
        }, 0);

      function contentBounds() {
        const nodes = allNodes();
        if (!nodes.length) return { minX: 0, minY: 0, maxX: BASE_BOARD_WIDTH, maxY: BASE_BOARD_HEIGHT };

          const pos = map.positions[node.id] || { x: 0, y: 0 };
          const height = estimatedCardHeight(node);
          return { minX: Math.min(bounds.minX, pos.x), minY: Math.min(bounds.minY, pos.y), maxX: Math.max(bounds.maxX, pos.x + 286), maxY: Math.max(bounds.maxY, pos.y + height) };
        }, { minX: Infinity, minY: Infinity, maxX: 0, maxY: 0 });
      }
      function boardSize() {
        const bounds = contentBounds();
        const contentW = bounds.maxX - bounds.minX;
        const contentH = bounds.maxY - bounds.minY;

        const svg = document.getElementById("graphLines");
        if (!svg) return;

          const to = map.positions[connection.to];
